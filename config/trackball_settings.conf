# ZMK Trackball + LED Config

# === PMW3610-ALT センサー設定 ===
# nice!nano v2: VCC安定待ちのための電源投入遅延（必須）
CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=1000

# REST移行を遅らせてスリープ復帰時のフリーズを抑制
# デフォルト128ms → 10000msに変更（以前は誤ったオプション名で未適用だった）
CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=10000

CONFIG_PMW3610_ALT_SMART_ALGORITHM=y

# BigWhaleフォーク試用中: スリープ有効（修正コードがCONFIG_ZMK_SLEEP=yで動くため）
CONFIG_ZMK_SLEEP=y

# === LED インジケーター設定 ===
CONFIG_RGBLED_WIDGET=n
