# ZMK Trackball + LED Config

# === PMW3610 センサー設定 ===
CONFIG_PMW3610_CPI=1200
CONFIG_PMW3610_SCROLL_TICK=12
CONFIG_PMW3610_SMART_ALGORITHM=y

# nice!nano v2 フリーズ対策: 電源投入時の認識エラー防止
CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=1000

# スリープ・復帰フリーズ対策
CONFIG_ZMK_SLEEP=n

# === LED インジケーター設定 ===
CONFIG_RGBLED_WIDGET=n
