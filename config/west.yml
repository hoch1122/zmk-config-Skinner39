manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: inorichi
      url-base: https://github.com/inorichi
  projects:
    # 2026-06-10: Zephyr 4.1 regression（#3207/#3195: central deep sleep wake失敗）回避のため
    # v0.3 タグに固定（Seaside39 実機と同じ構成）。v0.4.0 リリース後に更新を検討
    - name: zmk
      remote: zmkfirmware
      revision: v0.3
      import: app/west.yml
    # 2026-06-11: hoch1122 fork から inorichi 版に変更（Seaside39 実機と同一ドライバ・fork管理廃止）
    # 注意: badjeff 版（pmw3610-alt）は Zephyr 4.1 向けのためこのブランチでは使わない
    - name: zmk-pmw3610-driver
      remote: inorichi
      revision: main
  self:
    path: config
